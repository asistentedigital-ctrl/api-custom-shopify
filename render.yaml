services:
  - type: web
    name: kommo-shopify-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: KOMMO_API_KEY
        sync: false
      - key: SHOPIFY_STORE_DOMAIN
        sync: false
      - key: SHOPIFY_CLIENT_ID
        sync: false
      - key: SHOPIFY_CLIENT_SECRET
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2026-07"
      - key: KOMMO_SUBDOMAIN
        sync: false
      - key: KOMMO_ACCESS_TOKEN
        sync: false
      - key: KOMMO_QUERY_FIELD_ID
        sync: false
      - key: KOMMO_RESPONSE_FIELD_ID
        sync: false
